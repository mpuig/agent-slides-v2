<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>agent-slides preview</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #15181d;
      --panel: rgba(18, 21, 26, 0.9);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f3f4f6;
      --muted: #a7adb6;
      --slide-shadow: 0 30px 80px rgba(0, 0, 0, 0.42);
      --connected: #31c48d;
      --disconnected: #f05252;
      --accent: #f6c453;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Display", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top, rgba(246, 196, 83, 0.18), transparent 30%),
        linear-gradient(180deg, #1f232b 0%, #12161b 55%, #0d1014 100%);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(1120px, 100%);
      display: grid;
      gap: 18px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      background: var(--panel);
      backdrop-filter: blur(16px);
    }

    .toolbar-group {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: var(--disconnected);
      box-shadow: 0 0 0 6px rgba(240, 82, 82, 0.14);
    }

    .status-dot.connected {
      background: var(--connected);
      box-shadow: 0 0 0 6px rgba(49, 196, 141, 0.14);
    }

    .status-copy {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .status-copy strong {
      font-size: 0.95rem;
      font-weight: 650;
    }

    .status-copy span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .nav-button {
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.06);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, background 140ms ease;
    }

    .nav-button:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(246, 196, 83, 0.4);
      background: rgba(246, 196, 83, 0.1);
    }

    .nav-button:disabled {
      opacity: 0.42;
      cursor: default;
    }

    .counter {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .dots {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: center;
      flex-wrap: wrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      border: 0;
      padding: 0;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.2);
    }

    .dot.active {
      width: 28px;
      background: var(--accent);
    }

    .stage {
      display: grid;
      place-items: center;
      min-height: min(70vh, 760px);
      padding: 20px;
      border: 1px solid var(--panel-border);
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.02)),
        rgba(10, 12, 16, 0.58);
      backdrop-filter: blur(16px);
    }

    .slide-frame {
      width: min(100%, 960px);
      aspect-ratio: 4 / 3;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: var(--slide-shadow);
      background: #ffffff;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      background: #ffffff;
    }

    .empty {
      fill: #5f6772;
      font-size: 22px;
      font-weight: 600;
    }

    @media (max-width: 720px) {
      body { padding: 12px; }
      .toolbar { padding: 12px 14px; }
      .stage { padding: 12px; min-height: 55vh; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <div class="toolbar-group">
        <div id="status-dot" class="status-dot"></div>
        <div class="status-copy">
          <strong id="status-text">Disconnected</strong>
          <span id="status-subtext">Waiting for preview server</span>
        </div>
      </div>
      <div class="toolbar-group">
        <button id="prev-button" class="nav-button" type="button">Previous</button>
        <span id="slide-counter" class="counter">Slide 0 of 0</span>
        <button id="next-button" class="nav-button" type="button">Next</button>
      </div>
    </div>
    <div id="dot-strip" class="dots" aria-label="Slide navigation"></div>
    <div class="stage">
      <div class="slide-frame">
        <svg id="slide-root" viewBox="0 0 720 540" role="img" aria-label="Slide preview"></svg>
      </div>
    </div>
  </div>
  <script>
    const svgNS = "http://www.w3.org/2000/svg";
    const state = {
      deck: null,
      slideIndex: 0,
      reconnectDelayMs: 250,
    };

    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const statusSubtext = document.getElementById("status-subtext");
    const slideCounter = document.getElementById("slide-counter");
    const dotStrip = document.getElementById("dot-strip");
    const slideRoot = document.getElementById("slide-root");
    const prevButton = document.getElementById("prev-button");
    const nextButton = document.getElementById("next-button");

    function setConnectionStatus(connected, detail) {
      statusDot.classList.toggle("connected", connected);
      statusText.textContent = connected ? "Connected" : "Disconnected";
      statusSubtext.textContent = detail;
    }

    function clearSvg() {
      while (slideRoot.firstChild) {
        slideRoot.removeChild(slideRoot.firstChild);
      }
    }

    function appendSvg(tagName, attrs) {
      const node = document.createElementNS(svgNS, tagName);
      Object.entries(attrs).forEach(([key, value]) => {
        node.setAttribute(key, String(value));
      });
      slideRoot.appendChild(node);
      return node;
    }

    function renderEmpty(message) {
      clearSvg();
      appendSvg("rect", { x: 0, y: 0, width: 720, height: 540, fill: "#ffffff" });
      const text = appendSvg("text", {
        x: 360,
        y: 270,
        "text-anchor": "middle",
        class: "empty",
      });
      text.textContent = message;
    }

    function renderSlide() {
      const slides = state.deck?.slides ?? [];
      if (!slides.length) {
        slideCounter.textContent = "Slide 0 of 0";
        prevButton.disabled = true;
        nextButton.disabled = true;
        dotStrip.replaceChildren();
        renderEmpty("No slides in this deck yet");
        return;
      }

      if (state.slideIndex >= slides.length) {
        state.slideIndex = slides.length - 1;
      }

      const slide = slides[state.slideIndex];
      clearSvg();
      appendSvg("rect", { x: 0, y: 0, width: 720, height: 540, fill: "#ffffff" });

      for (const node of slide.nodes ?? []) {
        const computed = slide.computed?.[node.node_id];
        if (!computed) continue;

        if (computed.bg_color) {
          appendSvg("rect", {
            x: computed.x,
            y: computed.y,
            width: computed.width,
            height: computed.height,
            rx: 6,
            fill: computed.bg_color,
          });
        }

        const text = appendSvg("text", {
          x: computed.x + 12,
          y: computed.y + computed.font_size_pt + 8,
          fill: computed.color,
          "font-size": computed.font_size_pt,
          "font-family": computed.font_family,
          "font-weight": computed.font_bold ? 700 : 400,
        });

        const lines = String(node.content ?? "").split("\n");
        lines.forEach((line, index) => {
          const tspan = document.createElementNS(svgNS, "tspan");
          tspan.setAttribute("x", String(computed.x + 12));
          if (index > 0) {
            tspan.setAttribute("dy", String(computed.font_size_pt * 1.25));
          }
          tspan.textContent = line;
          text.appendChild(tspan);
        });
      }

      slideCounter.textContent = `Slide ${state.slideIndex + 1} of ${slides.length}`;
      prevButton.disabled = state.slideIndex === 0;
      nextButton.disabled = state.slideIndex === slides.length - 1;

      dotStrip.replaceChildren();
      slides.forEach((_, index) => {
        const dot = document.createElement("button");
        dot.type = "button";
        dot.className = index === state.slideIndex ? "dot active" : "dot";
        dot.ariaLabel = `Go to slide ${index + 1}`;
        dot.addEventListener("click", () => {
          state.slideIndex = index;
          renderSlide();
        });
        dotStrip.appendChild(dot);
      });
    }

    function applyDeck(deck) {
      state.deck = deck;
      renderSlide();
    }

    async function fetchDeck() {
      const response = await fetch("/api/deck", { cache: "no-store" });
      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }
      applyDeck(await response.json());
    }

    function connectWebSocket() {
      const protocol = window.location.protocol === "https:" ? "wss" : "ws";
      const socket = new WebSocket(`${protocol}://${window.location.host}/ws`);

      socket.addEventListener("open", () => {
        state.reconnectDelayMs = 250;
        setConnectionStatus(true, "Watching deck updates");
      });

      socket.addEventListener("message", (event) => {
        applyDeck(JSON.parse(event.data));
      });

      socket.addEventListener("close", () => {
        setConnectionStatus(false, "Connection lost, retrying");
        const retryDelay = state.reconnectDelayMs;
        state.reconnectDelayMs = Math.min(state.reconnectDelayMs * 2, 4000);
        window.setTimeout(connectWebSocket, retryDelay);
      });

      socket.addEventListener("error", () => socket.close());
    }

    prevButton.addEventListener("click", () => {
      if (state.slideIndex > 0) {
        state.slideIndex -= 1;
        renderSlide();
      }
    });

    nextButton.addEventListener("click", () => {
      const count = state.deck?.slides?.length ?? 0;
      if (state.slideIndex < count - 1) {
        state.slideIndex += 1;
        renderSlide();
      }
    });

    window.addEventListener("keydown", (event) => {
      if (event.key === "ArrowLeft") prevButton.click();
      if (event.key === "ArrowRight") nextButton.click();
    });

    renderEmpty("Loading preview");
    fetchDeck().catch(() => renderEmpty("Preview data unavailable"));
    connectWebSocket();
  </script>
</body>
</html>
