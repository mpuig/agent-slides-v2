<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>agent-slides preview</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Aptos", "Segoe UI", sans-serif;
        background: #f5f2ea;
        color: #1f1e1a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        height: 100vh;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(201, 142, 72, 0.16), transparent 35%),
          linear-gradient(180deg, #f8f4ed 0%, #efe7db 100%);
      }

      main {
        width: min(92vw, 980px);
        max-height: 98vh;
        padding: 12px 24px;
        display: flex;
        flex-direction: column;
      }

      .frame {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(70, 50, 25, 0.12);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(78, 55, 21, 0.15);
        overflow: hidden;
        flex: 1;
        min-height: 0;
        display: flex;
        flex-direction: column;
      }

      header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 20px;
        border-bottom: 1px solid rgba(70, 50, 25, 0.08);
        background: rgba(255, 255, 255, 0.7);
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        color: #6a5841;
      }

      .status-dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #c7b18f;
        box-shadow: 0 0 0 3px rgba(190, 161, 120, 0.16);
      }

      .status-dot[data-state="connected"],
      .status-dot[data-state="live"] {
        background: #2f8f4e;
        box-shadow: 0 0 0 3px rgba(47, 143, 78, 0.16);
      }

      .status-dot[data-state="disconnected"],
      .status-dot[data-state="reconnecting"] {
        background: #b44933;
        box-shadow: 0 0 0 3px rgba(180, 73, 51, 0.16);
      }

      .toolbar-top {
        padding: 8px 20px;
        border-bottom: 1px solid rgba(70, 50, 25, 0.08);
        background: rgba(255, 252, 247, 0.78);
      }

      .toolbar-top-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }

      .toolbar-bottom {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 16px;
        padding: 12px 20px;
        border-top: 1px solid rgba(70, 50, 25, 0.08);
        background: rgba(255, 252, 247, 0.78);
      }

      .render-progress {
        display: grid;
        gap: 8px;
        padding: 0 20px 12px;
        color: #6a5841;
      }

      .render-progress[hidden] {
        display: none;
      }

      .render-progress-copy {
        font-size: 13px;
        letter-spacing: 0.01em;
      }

      .render-progress-bar {
        width: 100%;
        height: 6px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(199, 177, 143, 0.3);
      }

      .render-progress-fill {
        width: 0%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, #c98e48 0%, #8e5a23 100%);
        transition: width 180ms ease;
      }

      .nav {
        display: inline-flex;
        align-items: center;
        gap: 12px;
      }

      button {
        appearance: none;
        border: 1px solid rgba(90, 65, 33, 0.18);
        background: rgba(255, 255, 255, 0.88);
        color: #453420;
        border-radius: 999px;
        min-width: 40px;
        min-height: 40px;
        padding: 0 14px;
        font: inherit;
        cursor: pointer;
        transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      }

      button:hover:enabled {
        transform: translateY(-1px);
        background: rgba(255, 255, 255, 1);
        border-color: rgba(90, 65, 33, 0.28);
      }

      button:disabled {
        opacity: 0.45;
        cursor: default;
      }

      .dots {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-height: 40px;
      }

      .dot {
        min-width: 12px;
        min-height: 12px;
        width: 12px;
        height: 12px;
        padding: 0;
        border-radius: 999px;
        border: 0;
        background: rgba(112, 88, 54, 0.22);
      }

      .dot[aria-current="true"] {
        background: #8e5a23;
        box-shadow: 0 0 0 4px rgba(142, 90, 35, 0.14);
      }

      .meta {
        font-size: 14px;
        color: #6a5841;
      }

      .preview-banner {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(196, 111, 46, 0.12);
        border: 1px solid rgba(196, 111, 46, 0.2);
        color: #7a4c1f;
        font-size: 13px;
        font-weight: 600;
      }

      .preview-banner[hidden] {
        display: none;
      }

      .stage-shell {
        flex: 1;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
      }

      #stage-image,
      svg {
        display: block;
        max-width: 100%;
        max-height: calc(100vh - 200px);
        object-fit: contain;
        background: white;
        border: 1px solid rgba(70, 50, 25, 0.15);
        box-shadow: 0 2px 12px rgba(78, 55, 21, 0.1);
      }

      #stage-image {
        object-fit: contain;
      }

      #stage-image[hidden],
      svg[hidden] {
        display: none;
      }

      .empty {
        fill: #7b6b56;
        font-size: 20px;
      }

      .empty-detail {
        fill: #9a8b78;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="frame">
        <header>
          <strong>agent-slides live preview</strong>
          <span class="status" id="status">
            <span class="status-dot" id="status-dot" data-state="connecting"></span>
            <span id="status-text">Connecting...</span>
          </span>
        </header>
        <div class="toolbar-top">
          <div class="toolbar-top-inner">
            <div class="meta" id="slide-count">Slide 0 of 0</div>
            <div class="preview-banner" id="preview-banner" hidden>Approximate preview (LibreOffice unavailable)</div>
          </div>
        </div>
        <div class="stage-shell">
          <img id="stage-image" alt="Slide preview" hidden>
          <svg id="stage" viewBox="0 0 720 540" role="img" aria-label="Slide preview"></svg>
        </div>
        <div class="render-progress" id="render-progress" hidden aria-live="polite">
          <div class="render-progress-copy" id="render-progress-text"></div>
          <div class="render-progress-bar" aria-hidden="true">
            <div class="render-progress-fill" id="render-progress-fill"></div>
          </div>
        </div>
        <div class="toolbar-bottom">
          <div class="nav" aria-label="Slide navigation">
            <button id="prev-slide" type="button" aria-label="Previous slide">&larr;</button>
            <div class="dots" id="slide-dots" aria-label="Slide list"></div>
            <button id="next-slide" type="button" aria-label="Next slide">&rarr;</button>
          </div>
        </div>
      </div>
    </main>
    <script>
      const SVG_NS = "http://www.w3.org/2000/svg";
      const stage = document.getElementById("stage");
      const stageImage = document.getElementById("stage-image");
      const statusDot = document.getElementById("status-dot");
      const statusText = document.getElementById("status-text");
      const prevButton = document.getElementById("prev-slide");
      const nextButton = document.getElementById("next-slide");
      const dots = document.getElementById("slide-dots");
      const slideCount = document.getElementById("slide-count");
      const previewBanner = document.getElementById("preview-banner");
      const renderProgress = document.getElementById("render-progress");
      const renderProgressText = document.getElementById("render-progress-text");
      const renderProgressFill = document.getElementById("render-progress-fill");
      const measureContext = document.createElement("canvas").getContext("2d");
      const APPROXIMATE_PREVIEW_NOTICE = "Approximate preview (LibreOffice unavailable)";
      const chartPalette = ["#c98e48", "#6e8ca7", "#8f9b5f", "#c56f5e", "#8672b8"];
      const chartTypeLabels = {
        area: "Area Chart",
        bar: "Bar Chart",
        column: "Column Chart",
        doughnut: "Doughnut Chart",
        line: "Line Chart",
        pie: "Pie Chart",
        scatter: "Scatter Plot",
      };

      let currentDeck = null;
      let currentSlideIndex = 0;
      let previewBackend = "svg";
      let previewLoadToken = 0;
      let reconnectDelayMs = 250;
      let reconnectTimer = null;
      let currentRenderProgress = null;

      const setConnectionState = (state, text) => {
        statusDot.dataset.state = state;
        statusText.textContent = text;
      };

      const setPreviewBackend = (backend) => {
        previewBackend = backend === "png" ? "png" : "svg";
      };

      const showSurface = (surface) => {
        if (surface === "png") {
          stageImage.hidden = false;
          stage.hidden = true;
          return;
        }
        stageImage.hidden = true;
        stage.hidden = false;
      };

      const setPreviewBanner = (message = "") => {
        const normalized = String(message || "").trim();
        previewBanner.hidden = normalized.length === 0;
        previewBanner.textContent = normalized || APPROXIMATE_PREVIEW_NOTICE;
      };

      const updateRenderProgress = () => {
        if (!currentRenderProgress || currentRenderProgress.total <= 0) {
          renderProgress.hidden = true;
          renderProgressText.textContent = "";
          renderProgressFill.style.width = "0%";
          return;
        }

        const slideIndex = Math.max(1, Number(currentRenderProgress.slide_index || 0));
        const total = Math.max(1, Number(currentRenderProgress.total || 0));
        const width = Math.min(100, Math.max(0, (slideIndex / total) * 100));
        renderProgress.hidden = false;
        renderProgressText.textContent = `Rendering slide ${slideIndex} of ${total}...`;
        renderProgressFill.style.width = `${width}%`;
      };

      const imageHref = (imagePath) => {
        const encoded = String(imagePath)
          .split("/")
          .map((segment) => encodeURIComponent(segment))
          .join("/");
        return `/api/images/${encoded}`;
      };

      const extractContentText = (content) => {
        if (typeof content === "string") {
          return content.trim();
        }
        if (!Array.isArray(content?.blocks)) {
          return "";
        }
        return content.blocks
          .map((block) => String(block?.text ?? "").trim())
          .filter(Boolean)
          .join(" ")
          .trim();
      };

      const nodeLines = (node) => {
        const blocks = node?.content?.blocks;
        if (!Array.isArray(blocks)) {
          const plain = typeof node?.content === "string" ? node.content : "";
          return String(plain)
            .split(/\r?\n/)
            .map((text) => ({ text, level: 0 }));
        }

        const lines = [];
        for (const block of blocks) {
          const parts = String(block?.text ?? "").split(/\r?\n/);
          const level = Number(block?.level ?? 0);
          const prefix = block?.type === "bullet" ? "\u2022 " : "";
          for (const part of parts) {
            lines.push({ text: `${prefix}${part}`, level });
          }
        }
        return lines.length > 0 ? lines : [{ text: "", level: 0 }];
      };

      const measureWidth = (text, fontFamily, fontSize, fontWeight) => {
        if (!measureContext) {
          return text.length * fontSize * 0.55;
        }
        measureContext.font = `${fontWeight} ${fontSize}px ${fontFamily}`;
        return measureContext.measureText(text).width;
      };

      const breakLongWord = (word, maxWidth, fontFamily, fontSize, fontWeight) => {
        const parts = [];
        let current = "";

        for (const character of word) {
          const candidate = `${current}${character}`;
          if (current && measureWidth(candidate, fontFamily, fontSize, fontWeight) > maxWidth) {
            parts.push(current);
            current = character;
          } else {
            current = candidate;
          }
        }

        if (current) {
          parts.push(current);
        }

        return parts;
      };

      const wrapText = (text, maxWidth, fontFamily, fontSize, fontWeight) => {
        if (!text) {
          return [""];
        }

        if (maxWidth <= 0 || measureWidth(text, fontFamily, fontSize, fontWeight) <= maxWidth) {
          return [text];
        }

        const words = text.split(/\s+/).filter(Boolean);
        if (words.length === 0) {
          return [text];
        }

        const lines = [];
        let current = "";

        for (const word of words) {
          if (measureWidth(word, fontFamily, fontSize, fontWeight) > maxWidth) {
            if (current) {
              lines.push(current);
              current = "";
            }
            lines.push(...breakLongWord(word, maxWidth, fontFamily, fontSize, fontWeight));
            continue;
          }

          const candidate = current ? `${current} ${word}` : word;
          if (measureWidth(candidate, fontFamily, fontSize, fontWeight) <= maxWidth) {
            current = candidate;
          } else {
            lines.push(current);
            current = word;
          }
        }

        if (current) {
          lines.push(current);
        }

        return lines;
      };

      const createSvgElement = (name, attributes = {}) => {
        const element = document.createElementNS(SVG_NS, name);
        for (const [key, value] of Object.entries(attributes)) {
          element.setAttribute(key, `${value}`);
        }
        return element;
      };

      const appendSvgText = (parent, text, attributes = {}) => {
        const element = createSvgElement("text", attributes);
        element.textContent = text;
        parent.appendChild(element);
        return element;
      };

      const formatCount = (count, singular, plural = `${singular}s`) =>
        `${count} ${count === 1 ? singular : plural}`;

      const chartTypeLabel = (chartType) => chartTypeLabels[chartType] ?? "Chart";

      const summarizeChart = (chartSpec) => {
        if (!chartSpec || typeof chartSpec !== "object") {
          return "Chart: no data";
        }

        const label = chartTypeLabel(chartSpec.chart_type);
        if (chartSpec.chart_type === "scatter") {
          return `${label}: ${formatCount(chartSpec.scatter_series?.length ?? 0, "series")}`;
        }

        const categoryCount = chartSpec.categories?.length ?? 0;
        const seriesCount = chartSpec.series?.length ?? 0;
        return `${label}: ${formatCount(categoryCount, "category", "categories")}, ${formatCount(seriesCount, "series")}`;
      };

      const getSeriesColors = (chartSpec, count) => {
        const configuredColors = Array.isArray(chartSpec?.style?.series_colors)
          ? chartSpec.style.series_colors.filter(Boolean)
          : [];
        return Array.from(
          { length: count },
          (_, index) => configuredColors[index] ?? chartPalette[index % chartPalette.length],
        );
      };

      const renderFallbackChartPreview = (group, frame) => {
        group.appendChild(
          createSvgElement("rect", {
            x: frame.x,
            y: frame.y,
            width: frame.width,
            height: frame.height,
            rx: 12,
            fill: "#f7f2ea",
            stroke: "#dfd6ca",
            "stroke-dasharray": "6 5",
          }),
        );
        appendSvgText(group, "Preview approximation", {
          x: frame.x + frame.width / 2,
          y: frame.y + frame.height / 2 + 4,
          "text-anchor": "middle",
          fill: "#8f806d",
          "font-size": 12,
        });
      };

      const renderBarChartPreview = (group, chartSpec, frame) => {
        const series = chartSpec?.series?.[0];
        const values = Array.isArray(series?.values) ? series.values : [];
        const categories = Array.isArray(chartSpec?.categories) ? chartSpec.categories : [];
        if (!values.length || !categories.length || frame.width <= 0 || frame.height <= 0) {
          renderFallbackChartPreview(group, frame);
          return;
        }

        const labelWidth = Math.min(56, frame.width * 0.28);
        const barAreaX = frame.x + labelWidth + 10;
        const barAreaWidth = Math.max(12, frame.width - labelWidth - 10);
        const rowGap = 6;
        const rowHeight = (frame.height - rowGap * (values.length - 1)) / values.length;
        if (rowHeight <= 0) {
          renderFallbackChartPreview(group, frame);
          return;
        }

        const maxValue = Math.max(1, ...values.map((value) => Math.abs(value)));
        const fill = getSeriesColors(chartSpec, 1)[0];

        values.forEach((value, index) => {
          const top = frame.y + index * (rowHeight + rowGap);
          const width = Math.max(0, (Math.abs(value) / maxValue) * barAreaWidth);

          appendSvgText(group, categories[index] ?? "", {
            x: frame.x,
            y: top + rowHeight * 0.7,
            fill: "#7b6b56",
            "font-size": 10,
          });
          group.appendChild(
            createSvgElement("rect", {
              x: barAreaX,
              y: top,
              width: barAreaWidth,
              height: rowHeight,
              rx: Math.min(6, rowHeight / 2),
              fill: "#f2ece3",
            }),
          );
          group.appendChild(
            createSvgElement("rect", {
              x: barAreaX,
              y: top,
              width,
              height: rowHeight,
              rx: Math.min(6, rowHeight / 2),
              fill,
              opacity: 0.92,
            }),
          );
        });
      };

      const renderColumnChartPreview = (group, chartSpec, frame) => {
        const seriesList = Array.isArray(chartSpec?.series) ? chartSpec.series.slice(0, 3) : [];
        const categories = Array.isArray(chartSpec?.categories) ? chartSpec.categories : [];
        if (!seriesList.length || !categories.length || frame.width <= 0 || frame.height <= 0) {
          renderFallbackChartPreview(group, frame);
          return;
        }

        const maxValue = Math.max(
          1,
          ...seriesList.flatMap((series) => (Array.isArray(series.values) ? series.values : []).map((value) => Math.abs(value))),
        );
        const colors = getSeriesColors(chartSpec, seriesList.length);
        const axisY = frame.y + frame.height;
        const categoryBand = frame.width / categories.length;
        const groupGap = Math.max(8, categoryBand * 0.18);
        const columnAreaWidth = Math.max(10, categoryBand - groupGap);
        const columnGap = Math.max(2, columnAreaWidth * 0.08);
        const columnWidth = Math.max(3, (columnAreaWidth - columnGap * (seriesList.length - 1)) / seriesList.length);

        group.appendChild(
          createSvgElement("line", {
            x1: frame.x,
            y1: axisY,
            x2: frame.x + frame.width,
            y2: axisY,
            stroke: "#d6cdc0",
            "stroke-width": 1,
          }),
        );

        categories.forEach((category, categoryIndex) => {
          const groupStart = frame.x + categoryIndex * categoryBand + groupGap / 2;
          appendSvgText(group, category, {
            x: groupStart + columnAreaWidth / 2,
            y: axisY + 12,
            "text-anchor": "middle",
            fill: "#7b6b56",
            "font-size": 10,
          });

          seriesList.forEach((series, seriesIndex) => {
            const value = Math.abs(series.values?.[categoryIndex] ?? 0);
            const height = (value / maxValue) * Math.max(16, frame.height - 18);
            const x = groupStart + seriesIndex * (columnWidth + columnGap);
            const y = axisY - height;

            group.appendChild(
              createSvgElement("rect", {
                x,
                y,
                width: columnWidth,
                height,
                rx: Math.min(5, columnWidth / 2),
                fill: colors[seriesIndex],
                opacity: 0.92,
              }),
            );
          });
        });
      };

      const renderLineChartPreview = (group, chartSpec, frame) => {
        const series = chartSpec?.series?.[0];
        const values = Array.isArray(series?.values) ? series.values : [];
        const categories = Array.isArray(chartSpec?.categories) ? chartSpec.categories : [];
        if (values.length < 2 || !categories.length || frame.width <= 0 || frame.height <= 0) {
          renderFallbackChartPreview(group, frame);
          return;
        }

        const maxValue = Math.max(1, ...values.map((value) => Math.abs(value)));
        const stepX = values.length === 1 ? frame.width : frame.width / (values.length - 1);
        const points = values.map((value, index) => {
          const x = frame.x + stepX * index;
          const y = frame.y + frame.height - (Math.abs(value) / maxValue) * Math.max(16, frame.height - 16);
          return `${x},${y}`;
        });
        const stroke = getSeriesColors(chartSpec, 1)[0];

        group.appendChild(
          createSvgElement("polyline", {
            points: points.join(" "),
            fill: "none",
            stroke,
            "stroke-width": 3,
            "stroke-linecap": "round",
            "stroke-linejoin": "round",
          }),
        );

        points.forEach((point, index) => {
          const [cx, cy] = point.split(",");
          group.appendChild(
            createSvgElement("circle", {
              cx,
              cy,
              r: 4,
              fill: stroke,
            }),
          );
          appendSvgText(group, categories[index] ?? "", {
            x: cx,
            y: frame.y + frame.height + 12,
            "text-anchor": "middle",
            fill: "#7b6b56",
            "font-size": 10,
          });
        });
      };

      const renderChartPreview = (group, chartSpec, frame) => {
        if (frame.width < 32 || frame.height < 24) {
          return;
        }

        if (chartSpec?.chart_type === "bar") {
          renderBarChartPreview(group, chartSpec, frame);
          return;
        }

        if (chartSpec?.chart_type === "column") {
          renderColumnChartPreview(group, chartSpec, frame);
          return;
        }

        if (chartSpec?.chart_type === "line") {
          renderLineChartPreview(group, chartSpec, frame);
          return;
        }

        renderFallbackChartPreview(group, frame);
      };

      const isNumericTableValue = (value) => {
        const normalized = `${value ?? ""}`.trim();
        if (!normalized) {
          return false;
        }
        return /^[()\-\+]?\s*(?:[$€£¥]\s*)?(?:(?:\d{1,3}(?:,\d{3})+|\d+)(?:\.\d+)?|\d*\.\d+)\s*(?:[KMBT]|bn|mm)?\s*%?\s*\)?$/i.test(normalized);
      };

      const tableColumnAlignments = (tableSpec) => {
        const headers = Array.isArray(tableSpec?.headers) ? tableSpec.headers : [];
        if (Array.isArray(tableSpec?.col_align) && tableSpec.col_align.length === headers.length) {
          return tableSpec.col_align.map((value) => {
            if (value === "center" || value === "right") {
              return value;
            }
            return "left";
          });
        }

        return headers.map((_, columnIndex) => {
          const values = Array.isArray(tableSpec?.rows)
            ? tableSpec.rows
                .map((row) => (Array.isArray(row) ? row[columnIndex] : ""))
                .filter((value) => `${value ?? ""}`.trim())
            : [];
          return values.length > 0 && values.every(isNumericTableValue) ? "right" : "left";
        });
      };

      const tableColumnWidths = (tableSpec) => {
        const headers = Array.isArray(tableSpec?.headers) ? tableSpec.headers : [];
        if (!headers.length) {
          return [];
        }

        if (Array.isArray(tableSpec?.col_widths) && tableSpec.col_widths.length === headers.length) {
          return tableSpec.col_widths.map((value) => (Number(value) > 0 ? Number(value) : 1));
        }

        return headers.map((header, columnIndex) => {
          const values = [header, ...(Array.isArray(tableSpec?.rows) ? tableSpec.rows.map((row) => row?.[columnIndex] ?? "") : [])];
          const maxLength = Math.max(...values.map((value) => `${value ?? ""}`.trim().length || 1));
          return maxLength + 2;
        });
      };

      const tableHeaderTextColor = (fill) => {
        const normalized = `${fill || "#1F4E79"}`.replace("#", "");
        if (normalized.length !== 6) {
          return "#FFFFFF";
        }
        const red = Number.parseInt(normalized.slice(0, 2), 16);
        const green = Number.parseInt(normalized.slice(2, 4), 16);
        const blue = Number.parseInt(normalized.slice(4, 6), 16);
        const luminance = (0.299 * red) + (0.587 * green) + (0.114 * blue);
        return luminance < 160 ? "#FFFFFF" : "#2A2824";
      };

      const renderTableNode = (node, computed) => {
        const tableSpec = node.table_spec ?? {};
        const headers = Array.isArray(tableSpec?.headers) ? tableSpec.headers : [];
        const rows = Array.isArray(tableSpec?.rows) ? tableSpec.rows : [];
        if (!headers.length) {
          renderTextNode(
            {
              ...node,
              content: { blocks: [{ type: "paragraph", text: "Empty table" }] },
            },
            computed,
          );
          return;
        }

        const group = createSvgElement("g", { "data-node-id": node.node_id });
        const columnWeights = tableColumnWidths(tableSpec);
        const columnWeightTotal = columnWeights.reduce((sum, value) => sum + value, 0) || headers.length;
        const columnAlignments = tableColumnAlignments(tableSpec);
        const rowCount = rows.length + 1;
        const rowHeight = Number(computed.height) / rowCount;
        const headerFill = tableSpec?.header_color || "#1F4E79";
        const headerTextColor = tableHeaderTextColor(headerFill);
        const stripeFill = "#f4efe7";
        const bodyFill = computed.bg_color || "#ffffff";
        const textColor = computed.color || "#2A2824";

        let currentX = Number(computed.x);
        const columnWidths = columnWeights.map((weight, columnIndex) => {
          if (columnIndex === headers.length - 1) {
            return Number(computed.x) + Number(computed.width) - currentX;
          }
          const width = (Number(computed.width) * weight) / columnWeightTotal;
          currentX += width;
          return width;
        });

        group.appendChild(
          createSvgElement("rect", {
            x: computed.x,
            y: computed.y,
            width: computed.width,
            height: computed.height,
            rx: 8,
            fill: "#ffffff",
            stroke: "#d6cdc0",
            "stroke-width": 1,
          }),
        );

        const drawCell = (rowIndex, columnIndex, text, fill, alignment, isHeader = false) => {
          const x = Number(computed.x) + columnWidths.slice(0, columnIndex).reduce((sum, value) => sum + value, 0);
          const y = Number(computed.y) + rowIndex * rowHeight;
          const width = columnWidths[columnIndex];

          group.appendChild(
            createSvgElement("rect", {
              x,
              y,
              width,
              height: rowHeight,
              fill,
              stroke: "#d6cdc0",
              "stroke-width": 1,
            }),
          );

          const padding = 10;
          let textX = x + padding;
          let textAnchor = "start";
          if (alignment === "center") {
            textX = x + width / 2;
            textAnchor = "middle";
          } else if (alignment === "right") {
            textX = x + width - padding;
            textAnchor = "end";
          }

          appendSvgText(group, `${text ?? ""}`, {
            x: textX,
            y: y + rowHeight * 0.62,
            "text-anchor": textAnchor,
            fill: isHeader ? headerTextColor : textColor,
            "font-size": isHeader ? 12 : 11,
            "font-weight": isHeader ? 700 : 500,
          });
        };

        headers.forEach((header, columnIndex) => {
          drawCell(0, columnIndex, header, headerFill, "center", true);
        });

        rows.forEach((row, rowIndex) => {
          const fill = tableSpec?.stripe !== false && rowIndex % 2 === 1 ? stripeFill : bodyFill;
          headers.forEach((_, columnIndex) => {
            drawCell(rowIndex + 1, columnIndex, row?.[columnIndex] ?? "", fill, columnAlignments[columnIndex]);
          });
        });

        stage.appendChild(group);
      };

      const renderStageBackground = () => {
        const background = createSvgElement("rect");
        background.setAttribute("x", "0");
        background.setAttribute("y", "0");
        background.setAttribute("width", "720");
        background.setAttribute("height", "540");
        background.setAttribute("fill", "#ffffff");
        stage.appendChild(background);
      };

      const renderMessageState = (headline, detail = "") => {
        renderStageBackground();
        const label = createSvgElement("text");
        label.setAttribute("x", "360");
        label.setAttribute("y", detail ? "252" : "270");
        label.setAttribute("text-anchor", "middle");
        label.setAttribute("class", "empty");
        label.textContent = headline;
        stage.appendChild(label);

        if (!detail) {
          return;
        }

        const sublabel = createSvgElement("text");
        sublabel.setAttribute("x", "360");
        sublabel.setAttribute("y", "284");
        sublabel.setAttribute("text-anchor", "middle");
        sublabel.setAttribute("class", "empty-detail");
        sublabel.textContent = detail;
        stage.appendChild(sublabel);
      };

      const renderEmptyState = () => {
        renderMessageState("No slides yet");
      };

      const renderWaitingState = (message) => {
        renderMessageState(
          message || "Waiting for deck...",
          "Create the deck file to start the live preview.",
        );
      };

      const renderTextNode = (node, computed) => {
        if (computed.bg_color) {
          const box = createSvgElement("rect");
          box.setAttribute("x", `${computed.x}`);
          box.setAttribute("y", `${computed.y}`);
          box.setAttribute("width", `${computed.width}`);
          box.setAttribute("height", `${computed.height}`);
          box.setAttribute("fill", computed.bg_color);
          box.setAttribute("fill-opacity", `${1 - Number(computed.bg_transparency ?? 0)}`);
          stage.appendChild(box);
        }

        const text = createSvgElement("text");
        const fontSize = Number(computed.font_size_pt ?? 18);
        const fontFamily = computed.font_family || "Aptos";
        const fontWeight = computed.font_bold ? 700 : 400;
        const lineHeight = fontSize * 1.25;
        const indentSize = fontSize * 1.2;
        const maxLines = Math.max(1, Math.floor(Number(computed.height ?? lineHeight) / lineHeight));

        text.setAttribute("x", `${computed.x}`);
        text.setAttribute("y", `${computed.y + fontSize}`);
        text.setAttribute("font-size", `${fontSize}`);
        text.setAttribute("font-family", fontFamily);
        text.setAttribute("font-weight", `${fontWeight}`);
        text.setAttribute("fill", computed.color || "#1f1e1a");

        let lineIndex = 0;
        for (const line of nodeLines(node)) {
          const level = Math.max(0, Number(line.level ?? 0));
          const startX = Number(computed.x) + (level * indentSize);
          const availableWidth = Math.max(24, Number(computed.width) - (level * indentSize));
          const wrapped = wrapText(line.text, availableWidth, fontFamily, fontSize, fontWeight);

          for (const segment of wrapped) {
            if (lineIndex >= maxLines) {
              break;
            }

            const tspan = createSvgElement("tspan");
            tspan.setAttribute("x", `${startX}`);
            tspan.setAttribute("dy", lineIndex === 0 ? "0" : `${lineHeight}`);
            tspan.textContent = segment || " ";
            text.appendChild(tspan);
            lineIndex += 1;
          }

          if (lineIndex >= maxLines) {
            break;
          }
        }

        stage.appendChild(text);
      };

      const renderImageNode = (node, computed) => {
        const image = createSvgElement("image");
        image.setAttribute("x", `${computed.x}`);
        image.setAttribute("y", `${computed.y}`);
        image.setAttribute("width", `${computed.width}`);
        image.setAttribute("height", `${computed.height}`);
        image.setAttribute("href", imageHref(node.image_path));
        image.setAttribute(
          "preserveAspectRatio",
          computed.image_fit === "stretch"
            ? "none"
            : computed.image_fit === "cover"
              ? "xMidYMid slice"
              : "xMidYMid meet"
        );
        stage.appendChild(image);
      };

      const renderChartNode = (node, computed) => {
        const chartSpec = node.chart_spec ?? {};
        const group = createSvgElement("g", { "data-node-id": node.node_id });
        const title = chartSpec.title ?? extractContentText(node.content);
        const summary = summarizeChart(chartSpec);
        const titleY = Number(computed.y) + 46;
        const summaryY = title ? titleY + 26 : Number(computed.y) + 48;
        const visualTop = summaryY + 18;
        const visualFrame = {
          x: Number(computed.x) + 16,
          y: visualTop,
          width: Math.max(0, Number(computed.width) - 32),
          height: Math.max(0, Number(computed.height) - (visualTop - Number(computed.y)) - 16),
        };

        group.appendChild(
          createSvgElement("rect", {
            x: computed.x,
            y: computed.y,
            width: computed.width,
            height: computed.height,
            rx: 20,
            fill: computed.bg_color || "#fbfaf7",
            stroke: "#cdc6bb",
            "stroke-width": 1.5,
          }),
        );

        appendSvgText(group, summary, {
          x: Number(computed.x) + 16,
          y: Number(computed.y) + 24,
          fill: "#7b6b56",
          "font-size": 12,
          "font-weight": 600,
        });

        if (title) {
          appendSvgText(group, title, {
            x: Number(computed.x) + 16,
            y: titleY,
            fill: "#2a2824",
            "font-size": 18,
            "font-weight": 700,
          });
        }

        renderChartPreview(group, chartSpec, visualFrame);
        stage.appendChild(group);
      };

      const clampSlideIndex = (index, total) => {
        if (total <= 0) {
          return 0;
        }
        return Math.min(Math.max(index, 0), total - 1);
      };

      const updateNavigation = (slides) => {
        const total = slides.length;
        const humanIndex = total === 0 ? 0 : currentSlideIndex + 1;
        slideCount.textContent = `Slide ${humanIndex} of ${total}`;
        prevButton.disabled = currentSlideIndex <= 0;
        nextButton.disabled = currentSlideIndex >= total - 1;

        dots.replaceChildren();
        slides.forEach((slide, index) => {
          const dot = document.createElement("button");
          dot.type = "button";
          dot.className = "dot";
          dot.ariaLabel = `Go to slide ${index + 1}`;
          dot.setAttribute("aria-current", index === currentSlideIndex ? "true" : "false");
          dot.addEventListener("click", () => {
            currentSlideIndex = index;
            renderDeck(currentDeck);
          });
          dots.appendChild(dot);
        });
      };

      const slidePreview = (index) => {
        if (!Array.isArray(currentDeck?.slide_previews)) {
          return null;
        }
        return currentDeck.slide_previews[index] ?? null;
      };

      const loadSlidePreview = (url) => {
        const requestToken = ++previewLoadToken;
        const probe = new Image();

        showSurface("svg");
        stageImage.removeAttribute("src");

        probe.addEventListener("load", () => {
          if (requestToken !== previewLoadToken) {
            return;
          }
          stageImage.src = url;
          showSurface("png");
        });

        probe.addEventListener("error", () => {
          if (requestToken !== previewLoadToken) {
            return;
          }
          stageImage.removeAttribute("src");
          setPreviewBackend("svg");
          showSurface("svg");
          setPreviewBanner(currentDeck?.preview_notice || APPROXIMATE_PREVIEW_NOTICE);
        });

        probe.src = url;
      };

      const renderDeck = (deck) => {
        currentDeck = deck && typeof deck === "object" ? deck : { slides: [] };
        const slides = Array.isArray(currentDeck.slides) ? currentDeck.slides : [];
        setPreviewBackend(currentDeck.preview_backend);
        currentSlideIndex = clampSlideIndex(currentSlideIndex, slides.length);
        stage.replaceChildren();
        updateNavigation(slides);
        previewLoadToken += 1;

        if (currentDeck.status === "waiting") {
          setPreviewBackend("svg");
          stageImage.removeAttribute("src");
          renderWaitingState(currentDeck.message);
          return;
        }

        if (slides.length === 0) {
          setPreviewBackend("svg");
          stageImage.removeAttribute("src");
          showSurface("svg");
          setPreviewBanner("");
          renderEmptyState();
          return;
        }

        renderStageBackground();
        stageImage.removeAttribute("src");
        showSurface("svg");

        const slide = slides[currentSlideIndex];
        for (const node of slide.nodes ?? []) {
          const computed = slide.computed?.[node.node_id];
          if (!computed) {
            continue;
          }

          if (node.type === "table" || computed.content_type === "table") {
            renderTableNode(node, computed);
            continue;
          }

          if (node.type === "chart" || computed.content_type === "chart") {
            renderChartNode(node, computed);
            continue;
          }

          if (node.type === "image" && node.image_path) {
            renderImageNode(node, computed);
            continue;
          }

          renderTextNode(node, computed);
        }

        if (previewBackend === "png") {
          const preview = slidePreview(currentSlideIndex);
          if (preview?.url) {
            setPreviewBanner("");
            stageImage.alt = `Slide ${currentSlideIndex + 1} preview`;
            loadSlidePreview(preview.url);
            return;
          }
          setPreviewBackend("svg");
        }

        setPreviewBanner(currentDeck.preview_notice || APPROXIMATE_PREVIEW_NOTICE);
      };

      const showRelativeSlide = (delta) => {
        const total = Array.isArray(currentDeck?.slides) ? currentDeck.slides.length : 0;
        const nextIndex = clampSlideIndex(currentSlideIndex + delta, total);
        if (nextIndex === currentSlideIndex) {
          return;
        }
        currentSlideIndex = nextIndex;
        renderDeck(currentDeck);
      };

      const scheduleReconnect = () => {
        if (reconnectTimer !== null) {
          return;
        }

        const delay = reconnectDelayMs;
        setConnectionState("reconnecting", `Reconnecting in ${Math.round(delay / 100) / 10}s`);
        reconnectTimer = window.setTimeout(() => {
          reconnectTimer = null;
          connect();
        }, delay);
        reconnectDelayMs = Math.min(reconnectDelayMs * 2, 4000);
      };

      const connect = () => {
        const protocol = window.location.protocol === "https:" ? "wss" : "ws";
        const socket = new WebSocket(`${protocol}://${window.location.host}/ws`);

        setConnectionState("connecting", "Connecting...");

        socket.addEventListener("open", () => {
          reconnectDelayMs = 250;
          setConnectionState("connected", "Connected");
        });

        socket.addEventListener("message", (event) => {
          const payload = JSON.parse(event.data);
          if (payload.type === "rendering") {
            currentRenderProgress = payload;
            updateRenderProgress();
            setConnectionState("live", "Rendering preview");
            return;
          }

          currentRenderProgress = null;
          updateRenderProgress();

          if (payload.type === "slides_updated") {
            fetch("/api/deck")
              .then((response) => response.json())
              .then((deck) => renderDeck(deck))
              .catch(() => setConnectionState("disconnected", "Unable to refresh preview"));
          } else {
            renderDeck(payload.deck ?? payload);
          }
          setConnectionState("live", "Live");
        });

        socket.addEventListener("close", () => {
          setConnectionState("disconnected", "Disconnected");
          scheduleReconnect();
        });

        socket.addEventListener("error", () => {
          socket.close();
        });
      };

      prevButton.addEventListener("click", () => showRelativeSlide(-1));
      nextButton.addEventListener("click", () => showRelativeSlide(1));

      window.addEventListener("keydown", (event) => {
        if (event.target instanceof HTMLInputElement || event.target instanceof HTMLTextAreaElement) {
          return;
        }

        if (event.key === "ArrowLeft") {
          showRelativeSlide(-1);
        } else if (event.key === "ArrowRight") {
          showRelativeSlide(1);
        }
      });

      fetch("/api/deck")
        .then((response) => response.json())
        .then((deck) => renderDeck(deck))
        .catch(() => {
          renderDeck({ slides: [] });
          currentRenderProgress = null;
          updateRenderProgress();
          setConnectionState("disconnected", "Unable to load deck");
        })
        .finally(connect);
    </script>
  </body>
</html>
