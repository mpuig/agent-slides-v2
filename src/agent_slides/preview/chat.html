<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>agent-slides chat</title>
    <style>
      :root {
        color-scheme: light;
        font-family: "Aptos", "Segoe UI", sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #f7f4ed 0%, #ece8de 100%);
        color: #1f2933;
      }

      main {
        width: min(720px, calc(100vw - 32px));
        background: rgba(255, 255, 255, 0.92);
        border: 1px solid rgba(31, 41, 51, 0.12);
        border-radius: 24px;
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.14);
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.5rem;
      }

      p {
        margin: 0 0 20px;
        color: #52606d;
      }

      #messages {
        min-height: 280px;
        max-height: 52vh;
        overflow: auto;
        border: 1px solid rgba(82, 96, 109, 0.18);
        border-radius: 18px;
        padding: 16px;
        background: #fffdf8;
      }

      .message {
        padding: 12px 14px;
        border-radius: 14px;
        margin-bottom: 12px;
        background: #f2efe7;
      }

      .message[data-type="user_message"] {
        background: #dfe7ff;
      }

      .meta {
        display: block;
        font-size: 0.75rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #52606d;
        margin-bottom: 4px;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 12px;
        margin-top: 16px;
      }

      input,
      button {
        font: inherit;
        border-radius: 14px;
        border: 1px solid rgba(82, 96, 109, 0.18);
        padding: 12px 14px;
      }

      button {
        cursor: pointer;
        background: #1f2933;
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>agent-slides chat</h1>
      <p>Chat mode is connected to <code>/chat/ws</code>.</p>
      <section id="messages" aria-live="polite"></section>
      <form id="composer">
        <input id="prompt" name="prompt" placeholder="Add a slide about Q3 revenue" />
        <button type="submit">Send</button>
      </form>
    </main>
    <script>
      const messages = document.getElementById("messages");
      const composer = document.getElementById("composer");
      const prompt = document.getElementById("prompt");
      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      const socket = new WebSocket(`${protocol}//${window.location.host}/chat/ws`);

      function appendMessage(message) {
        const item = document.createElement("article");
        item.className = "message";
        item.dataset.type = message.type || "assistant_message";

        const meta = document.createElement("span");
        meta.className = "meta";
        meta.textContent = [message.type, message.status].filter(Boolean).join(" • ");
        item.appendChild(meta);

        const body = document.createElement("div");
        body.textContent = message.text || "";
        item.appendChild(body);

        messages.appendChild(item);
        messages.scrollTop = messages.scrollHeight;
      }

      socket.addEventListener("message", (event) => {
        appendMessage(JSON.parse(event.data));
      });

      composer.addEventListener("submit", (event) => {
        event.preventDefault();
        const text = prompt.value.trim();
        if (!text) return;
        const message = { type: "user_message", text };
        socket.send(JSON.stringify(message));
        appendMessage(message);
        prompt.value = "";
      });
    </script>
  </body>
</html>
